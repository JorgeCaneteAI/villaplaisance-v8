---
deployment:
  tasks:
    # IMPORTANT — repo V8 = environnement de DEV, déploie sur le
    # sous-domaine v2.villaplaisance.fr.
    # La prod villaplaisance.fr est servie par le repo `villaplaisance-v7`,
    # on n'y touche pas tant que la bascule n'a pas été décidée.
    - export DEPLOYPATH=/home/efkz3012/v2.villaplaisance.fr/
    - /bin/cp -R * $DEPLOYPATH
    # Le .htaccess racine (125b, juste "redirige vers /public/") sert
    # uniquement quand le DocumentRoot Apache est à la racine du projet.
    # Ici le sous-domaine pointe directement sur public/, donc on ne le
    # copie PAS et on laisse public/.htaccess (le vrai, complet) tranquille.
    - chmod -R 755 $DEPLOYPATH
